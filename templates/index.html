<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySmart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="mb-4 text-primary">StudySmart AI 🎓</h1>
                <p class="text-muted">Paste your textbook notes below to get a 3-bullet summary and a 2-question quiz instantly.</p>
                
                <form action="/analyze" method="POST" class="card p-4 shadow-sm">
                    <div class="mb-3">
                        <textarea class="form-control" name="text" rows="8" placeholder="Paste your study material here..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Ask Study Buddy AI</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
